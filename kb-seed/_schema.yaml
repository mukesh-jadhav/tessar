# JSON Schema (Draft 2020-12) for kb-seed/components/*.yaml records.
# Loaded into Postgres at deploy (Phase 3.1+). Validated in CI by
# `evals/runners/validate_kb.py`.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://tessar.dev/schemas/kb-component.json"
title: KB component record
type: object
additionalProperties: false
required:
  - id
  - name
  - category
  - vendor
  - cloud
  - pricing_model
  - sources
  - last_verified_at
properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]*\\.[a-z0-9][a-z0-9-]*$"
    description: "stable slug, `<vendor>.<short-name>`. Used as foreign key from RunPackage cites."
  name:
    type: string
    minLength: 2
    description: "human-readable name as it should appear in the design package."
  category:
    type: string
    pattern: "^[a-z0-9-]+(\\.[a-z0-9-]+)*$"
    description: "dotted category, e.g. `compute.serverless-containers`."
  vendor:
    type: string
    enum: [google, amazon, microsoft, stripe, resend, openai, anthropic, vercel, cloudflare, other]
  cloud:
    type: string
    enum: [gcp, aws, azure, multi, none]
  pricing_model:
    type: string
    minLength: 4
  baseline_cost_usd_per_month:
    type: number
    minimum: 0
    description: |
      Representative monthly cost for an MVP-sized deployment (single instance /
      small tier / low volume). Used by the `cost_realism` rubric axis.
      0 = pay-per-use only with no fixed monthly floor at MVP volumes.
  baseline_cost_assumptions:
    type: string
    description: "What the baseline_cost_usd_per_month figure assumes."
  regions:
    type: array
    items: { type: string }
    minItems: 1
  compliance:
    type: array
    items: { type: string }
  capabilities:
    type: array
    items: { type: string }
    description: "Free-form tags the agents match against requirement slots."
  alternatives:
    type: array
    description: "Other components in the same slot. Used by tradeoff_quality."
    items:
      type: object
      additionalProperties: false
      required: [id, why_not_default]
      properties:
        id: { type: string }
        why_not_default: { type: string, minLength: 8 }
  limits:
    type: object
    description: "Hard limits that gate scale_appropriateness scoring."
    additionalProperties: true
  sources:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [url, snapshot_date]
      properties:
        url:
          type: string
          pattern: "^https?://"
        snapshot_date:
          type: string
          format: date
        title: { type: string }
  last_verified_at:
    type: string
    format: date
    description: "Human re-verified on this date. Freshness SLA = 90 days (see kb-seed/README.md)."
  notes:
    type: string
