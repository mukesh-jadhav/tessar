id: gcp.secret-manager
name: Secret Manager
category: security.secret-store
vendor: google
cloud: gcp
pricing_model: per-active-secret-version-month + per-access-operation
baseline_cost_usd_per_month: 2
baseline_cost_assumptions: |
  ~10 active secret versions, < 10k access operations per month. Free tier
  covers 6 active versions and 10k accesses, so realistic MVP cost is often
  under $1.
regions:
  - global (with regional replication options)
compliance:
  - SOC2
  - ISO27001
  - HIPAA-eligible
capabilities:
  - secret-storage
  - automatic-replication
  - iam-scoped-access
  - audit-logging
  - cmek-encryption
limits:
  max_secret_payload_kib: 64
  max_secret_versions: 10000
alternatives:
  - id: gcp.cloud-kms
    why_not_default: |
      KMS is for key/data encryption, not secret storage. Use both — KMS for
      CMEK on Secret Manager itself when compliance requires it.
  - id: external.hashicorp-vault
    why_not_default: |
      Vault adds HA cluster operations; skip unless multi-cloud secret
      brokering or dynamic database credentials are a stated requirement.
sources:
  - url: https://cloud.google.com/secret-manager/docs
    snapshot_date: 2026-05-11
    title: "Secret Manager — overview"
  - url: https://cloud.google.com/secret-manager/pricing
    snapshot_date: 2026-05-11
    title: "Secret Manager — pricing"
last_verified_at: 2026-05-11
notes: |
  Holds Auth.js secret, Google OAuth client secret, Resend API key, Stripe
  keys at MVP. Read by Cloud Run services via per-service service accounts.
