# Local dev stack for TESSAR.
# Mirrors the GCP services used in dev/prod with open-source / emulator equivalents.
# See .github/instructions/architecture.instructions.md for the production mapping.

name: tessar

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tessar-postgres
    environment:
      POSTGRES_USER: tessar
      POSTGRES_PASSWORD: tessar
      POSTGRES_DB: tessar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tessar -d tessar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tessar-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Cloud Storage emulator (S3-compatible-ish, GCS-API compatible).
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: tessar-fake-gcs
    command: ["-scheme", "http", "-public-host", "localhost:4443"]
    ports:
      - "4443:4443"
    volumes:
      - fake-gcs-data:/storage

  # Pub/Sub emulator (matches GCP Pub/Sub API).
  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    container_name: tessar-pubsub
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
      - --project=tessar-local
    ports:
      - "8085:8085"

  # Mailpit — local SMTP capture for Auth.js magic-link emails.
  mailpit:
    image: axllent/mailpit:latest
    container_name: tessar-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  postgres-data:
  redis-data:
  fake-gcs-data:
